<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練後台登入</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #3d5c40 0%, #2d4030 40%, #1a2a1c 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo { font-size: 40px; margin-bottom: 16px; }
  .title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 400;
    color: #2d2d2d;
    margin-bottom: 8px;
  }
  .subtitle { font-size: 14px; color: #6b6b6b; margin-bottom: 40px; line-height: 1.6; }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 24px;
    background: white;
    border: 1.5px solid #e0dbd4;
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    color: #2d2d2d;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .google-btn:hover { background: #f9f9f9; border-color: #7a9e7e; }
  .google-icon { width: 20px; height: 20px; }
  .note { font-size: 11px; color: #aaa; margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <div class="title">教練後台</div>
  <div class="subtitle">只有授權的教練帳號<br>才可以登入查看學員資料</div>
  <a href="/api/auth/signin/google" class="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    用 Google 帳號登入
  </a>
  <div class="note">這個頁面只供教練使用<br>學員請回到主頁面使用探索工具</div>
</div>
</body>
</html>
