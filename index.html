<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>內心探索助理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root {
    --sage: #7a9e7e;
    --sage-light: #a8c5ab;
    --sage-dark: #4a6b4e;
    --cream: #faf7f2;
    --charcoal: #2d2d2d;
    --mid: #6b6b6b;
    --light: #c8c0b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); font-family: 'Noto Sans TC', sans-serif; color: var(--charcoal); min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* WELCOME */
  #welcome {
    background: linear-gradient(160deg, #3d5c40 0%, #2d4030 40%, #1a2a1c 100%);
    justify-content: flex-end;
    padding: 40px 28px 56px;
    position: relative;
    overflow: hidden;
  }
  #welcome::before {
    content: '';
    position: absolute;
    top: -20%; right: -20%;
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, rgba(122,158,126,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .welcome-eyebrow { font-size: 11px; letter-spacing: 3px; color: #7a9e7e; text-transform: uppercase; margin-bottom: 16px; }
  .welcome-title { font-family: 'Noto Serif TC', serif; font-size: 36px; font-weight: 300; line-height: 1.3; color: #f0ede8; margin-bottom: 12px; }
  .welcome-title span { color: #a8c5ab; }
  .welcome-sub { font-size: 14px; color: #8aaa8e; line-height: 1.8; margin-bottom: 48px; }
  .welcome-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-primary {
    background: linear-gradient(135deg, #7a9e7e, #5a7e5e);
    color: white; border: none;
    padding: 18px 28px; border-radius: 16px;
    font-size: 16px; font-weight: 500; font-family: inherit;
    cursor: pointer; text-align: left;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 16px rgba(90,126,94,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06); color: #a8c5ab;
    border: 1px solid rgba(122,158,126,0.3);
    padding: 16px 28px; border-radius: 16px;
    font-size: 14px; font-family: inherit;
    cursor: pointer; text-align: left;
    -webkit-tap-highlight-color: transparent;
  }

  /* SETUP */
  #setup { background: var(--cream); }
  .screen-header {
    background: white; padding: 20px 24px 16px;
    border-bottom: 1px solid #ede8e0;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: #f0ede8; color: var(--mid);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .screen-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 400; }
  .setup-body { padding: 24px 20px; flex: 1; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--mid); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .form-input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid #e0dbd4; border-radius: 12px;
    font-size: 15px; font-family: inherit; color: var(--charcoal);
    background: white; outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--sage); }
  textarea.form-input { min-height: 100px; resize: none; line-height: 1.6; }
  .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .module-btn {
    padding: 14px 10px; border-radius: 12px;
    border: 1.5px solid #e0dbd4; background: white;
    font-size: 13px; font-family: inherit; color: var(--mid);
    cursor: pointer; text-align: center; line-height: 1.4;
    -webkit-tap-highlight-color: transparent;
  }
  .module-btn.selected { border-color: var(--sage); background: #f0f7f0; color: var(--sage-dark); font-weight: 500; }
  .week-row { display: flex; gap: 8px; }
  .week-btn {
    flex: 1; padding: 12px 6px; border-radius: 10px;
    border: 1.5px solid #e0dbd4; background: white;
    font-size: 14px; font-family: inherit; color: var(--mid);
    cursor: pointer; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .week-btn.selected { border-color: var(--sage); background: #f0f7f0; color: var(--sage-dark); font-weight: 500; }
  .setup-footer { padding: 20px; background: white; border-top: 1px solid #ede8e0; position: sticky; bottom: 0; }
  .btn-full {
    width: 100%; background: linear-gradient(135deg, #7a9e7e, #5a7e5e);
    color: white; border: none; padding: 18px; border-radius: 14px;
    font-size: 16px; font-weight: 500; font-family: inherit;
    cursor: pointer; box-shadow: 0 4px 16px rgba(90,126,94,0.3);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-full:disabled { background: #c8c0b8; box-shadow: none; cursor: not-allowed; }

  /* CHAT */
  #chat { background: var(--cream); height: 100vh; overflow: hidden; }
  .chat-header {
    background: white; padding: 16px 20px;
    border-bottom: 1px solid #ede8e0;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-info { flex: 1; }
  .chat-name { font-size: 15px; font-weight: 500; }
  .chat-meta { font-size: 11px; color: var(--mid); margin-top: 1px; }
  .module-badge {
    background: #f0f7f0; color: var(--sage-dark);
    border: 1px solid #c8e0ca;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .chat-messages {
    height: calc(100vh - 140px);
    overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg-with-avatar { display: flex; align-items: flex-end; gap: 8px; }
  .coach-avatar {
    width: 28px; height: 28px; min-width: 28px;
    background: linear-gradient(135deg, #7a9e7e, #4a6b4e);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: white; margin-bottom: 4px;
  }
  .msg-text { padding: 14px 16px; border-radius: 18px; font-size: 15px; line-height: 1.75; }
  .msg.assistant .msg-text { background: white; color: var(--charcoal); border-bottom-left-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .msg.user .msg-text { background: linear-gradient(135deg, #7a9e7e, #5a7e5e); color: white; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--light); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 14px 16px; background: white; border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); max-width: 80px; }
  .dot { width: 7px; height: 7px; background: var(--sage-light); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .chat-input-area { background: white; border-top: 1px solid #ede8e0; padding: 12px 16px; display: flex; align-items: flex-end; gap: 10px; }
  #userInput {
    flex: 1; border: 1.5px solid #e0dbd4; border-radius: 22px;
    padding: 12px 18px; font-size: 15px; font-family: inherit;
    color: var(--charcoal); outline: none; resize: none;
    min-height: 46px; max-height: 120px; line-height: 1.5;
    -webkit-appearance: none;
  }
  #userInput:focus { border-color: var(--sage); }
  .send-btn {
    width: 46px; height: 46px; min-width: 46px;
    border-radius: 50%; background: linear-gradient(135deg, #7a9e7e, #5a7e5e);
    border: none; color: white; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(90,126,94,0.4);
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }

  /* DASHBOARD */
  #dashboard { background: #1a2a1c; color: #e8f0e8; }
  .dash-header { padding: 20px 24px 16px; border-bottom: 1px solid #2d3f2f; display: flex; align-items: center; justify-content: space-between; }
  .dash-header h2 { font-size: 18px; font-weight: 500; color: #a8c5ab; }
  .back-btn { background: none; border: 1px solid #4a6b4e; color: #a8c5ab; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .dash-list { padding: 16px; flex: 1; overflow-y: auto; }
  .student-card { background: #243526; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
  .student-name { font-size: 16px; font-weight: 500; color: #d4e8d4; margin-bottom: 4px; }
  .student-meta { font-size: 12px; color: #7a9e7e; margin-bottom: 10px; }
  .student-preview { font-size: 13px; color: #9ab09a; line-height: 1.6; max-height: 60px; overflow: hidden; }
  .convo-detail { display: none; flex-direction: column; height: 100vh; background: #1a2a1c; }
  .convo-header { padding: 16px 20px; border-bottom: 1px solid #2d3f2f; display: flex; align-items: center; gap: 12px; }
  .convo-header h3 { font-size: 16px; color: #d4e8d4; flex: 1; }
  .convo-messages { flex: 1; overflow-y: auto; padding: 16px; }
  .msg-row { margin-bottom: 16px; }
  .msg-label { font-size: 11px; color: #7a9e7e; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; }
  .msg-bubble { background: #243526; border-radius: 12px; padding: 12px 14px; font-size: 14px; line-height: 1.7; color: #d4e8d4; }
  .msg-bubble.assistant { background: #1e3320; border-left: 3px solid #7a9e7e; color: #b8d4b8; }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--mid); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .disclaimer { font-size: 11px; color: #8aaa8e; text-align: center; padding: 12px 20px; line-height: 1.6; }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="welcome-eyebrow">Self Concept Coaching</div>
  <div class="welcome-title">探索你<br>內心的<span>那個人</span></div>
  <div class="welcome-sub">透過一個又一個的問題<br>找到驅動你的那個核心</div>
  <div class="welcome-buttons">
    <button class="btn-primary" onclick="showScreen('setup')">
      <span>開始新的探索</span><span>→</span>
    </button>
    <button class="btn-secondary" onclick="showScreen('dashboard')">📋 教練後台</button>
  </div>
  <div class="disclaimer">本工具為教練輔助工具，不提供心理治療或醫療建議。<br>如有心理健康需求，請諮詢專業人員。</div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="screen-header">
    <button class="icon-btn" onclick="showScreen('welcome')">←</button>
    <span class="screen-title">設定你的探索</span>
  </div>
  <div class="setup-body">
    <div class="form-group">
      <label class="form-label">你的名字</label>
      <input type="text" class="form-input" id="studentName" placeholder="輸入你的名字">
    </div>
    <div class="form-group">
      <label class="form-label">選擇探索模組</label>
      <div class="module-grid">
        <button class="module-btn" onclick="selectModule(this,'金錢')">💰 金錢<br><small style="color:#aaa;font-size:11px">含物質信念</small></button>
        <button class="module-btn" onclick="selectModule(this,'事業')">🌟 事業<br><small style="color:#aaa;font-size:11px">含健康能量</small></button>
        <button class="module-btn" onclick="selectModule(this,'親子家庭')">🌿 親子家庭<br><small style="color:#aaa;font-size:11px">雙向探索</small></button>
        <button class="module-btn" onclick="selectModule(this,'伴侶關係')">💫 伴侶關係<br><small style="color:#aaa;font-size:11px">含自我情緒</small></button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">目前進行到第幾週</label>
      <div class="week-row">
        <button class="week-btn" onclick="selectWeek(this,1)">第一週</button>
        <button class="week-btn" onclick="selectWeek(this,2)">第二週</button>
        <button class="week-btn" onclick="selectWeek(this,3)">第三週</button>
        <button class="week-btn" onclick="selectWeek(this,4)">第四週</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">上次 Session 的重點（選填）</label>
      <textarea class="form-input" id="sessionNotes" placeholder="例如：挖到安全感和自由這兩個詞，還沒有往更深處走..."></textarea>
    </div>
  </div>
  <div class="setup-footer">
    <button class="btn-full" id="startBtn" onclick="startChat()" disabled>開始探索</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div class="chat-header">
    <button class="icon-btn" onclick="showScreen('welcome')">←</button>
    <div class="chat-info">
      <div class="chat-name" id="chatName">—</div>
      <div class="chat-meta" id="chatMeta">—</div>
    </div>
    <div class="module-badge" id="chatBadge">—</div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="empty-state"><div class="empty-icon">🌿</div></div>
  </div>
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="輸入你的回答..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen" style="background:#1a2a1c;color:#e8f0e8;">
  <div class="dash-header">
    <h2>📋 教練後台</h2>
    <button class="back-btn" onclick="showScreen('welcome')">← 返回</button>
  </div>
  <div id="dashContent" class="dash-list"></div>
  <div id="convoDetail" class="convo-detail">
    <div class="convo-header">
      <button class="icon-btn" style="background:#2d4030;color:#a8c5ab" onclick="closeConvo()">←</button>
      <h3 id="convoTitle">—</h3>
    </div>
    <div class="convo-messages" id="convoMessages"></div>
  </div>
</div>

<script>
const HANDBOOK = {
  金錢: {
    1: { rule:'不替學員說出任何一個詞。挖到讓他身體有感覺的詞為止。', context:`模組一：金錢 第一週：價值觀挖掘\n起點：「如果你現在的金錢狀態變成你想要的樣子，你的生活會有什麼不同？」\n問句鏈Q1-Q11：從外部結果挖到Self Concept核心\n- Q1: 擁有這個目標，會為你的人生帶來什麼你現在感受不到的改變？\n- Q2: 當你真正得到它時，這件事會為你完成什麼樣的任務或功能？\n- Q3: 擁有這個目標，會為你帶來什麼你現在沒有的東西？\n- Q4: 如果你已經擁有了它，那會讓你有能力去做到哪些你以前做不到的事？\n- Q5: 這個結果會提供給你什麼樣的資源，好讓你去追求下一個階段？\n- Q6: 擁有這個東西，對你來說最核心的重要性是什麼？\n- Q7: 當這個目標實現後，它解決了你生命中的哪一個不安或空缺？\n- 橋接：那個不安或空缺，讓你覺得自己是一個什麼樣的人？\n- Q8: 關於這個目標，對你來說最重要的部分是什麼？\n- Q9: 如果這個目標實現了，那會滿足你內心的哪一種渴望？\n- Q10: 當你擁有這個目標時，你覺得自己變成了一個什麼樣的人？\n- Q11: 在那個擁有它的畫面裡，你最喜歡哪一個部分的自己？\n- 落地：在這個領域裡，你是一個什麼樣的人？\n卡點：一直說外部成就→「如果把那些全部拿掉，你還想要什麼？」` },
    2: { rule:'先讓學員定義每個詞，再排序。', context:`模組一：金錢 第二週：排序＋願景建立\n確認上週清單，定義每個詞，兩兩配對排序，建立願景畫面，落地問句。` },
    3: { rule:'從家族語錄切入，找到阻力真正的根源。', context:`模組一：金錢 第三週：家族語錄信念辨識\n找出最有身體反應的家族金錢語錄，深入記憶，找正向意圖，建立新信念。` },
    4: { rule:'整合所有材料，建立新的Self Concept宣言。', context:`模組一：金錢 第四週：Self Concept整合宣言\n回顧三週材料，確認核心三個詞，建立宣言，讓學員唸出並觀察身體反應。` }
  },
  事業: {
    1: { rule:'所有答案都繼續往下問，不幫學員評估答案是否夠真實。', context:`模組二：事業 第一週：價值觀挖掘\n起點：「在事業上，你真正想要什麼？」\n同金錢模組Q1-Q11問句鏈，聚焦事業面向。\n健康能量融入：「你現在的工作狀態，你的身體感受是什麼？輕還是重？」\n卡點：一直說外部環境→「在那些之外，你自己裡面有什麼聲音？」` },
    2: { rule:'排序＋事業願景建立，健康能量做連結。', context:`模組二：事業 第二週：排序＋願景` },
    3: { rule:'找出阻止事業前進的核心信念。', context:`模組二：事業 第三週：職場信念辨識` },
    4: { rule:'整合宣言，事業Self Concept完整建立。', context:`模組二：事業 第四週：整合宣言` }
  },
  親子家庭: {
    1: { rule:'不評論父母，焦點永遠在學員自己的需求和選擇上。', context:`模組三：親子家庭 第一週：雙向探索\n子女版起點：「在你和父母的關係裡，你真正想要的是什麼？」\n父母版起點：「作為父母，在和孩子的關係裡，你真正想要的是什麼？」\n走Q1-Q11問句鏈，最後各自有落地問句。` },
    2: { rule:'排序親子關係的核心價值觀。', context:`模組三：親子家庭 第二週：排序＋願景` },
    3: { rule:'家族模式識別與轉化。', context:`模組三：親子家庭 第三週：家族模式` },
    4: { rule:'整合宣言。', context:`模組三：親子家庭 第四週：整合宣言` }
  },
  伴侶關係: {
    1: { rule:'焦點永遠在學員，不在伴侶。學員說伴侶的行為，把它翻譯成學員的感受需求。', context:`模組四：伴侶關係 第一週：價值觀挖掘\n起點：「在親密關係裡，你希望可以感受到什麼？你覺得什麼是重要的？」\n問句鏈Q1-Q11：從外部條件挖到內在感受需求。\n自我情緒融入：「在關係裡，你最難被接住的那個情緒是什麼？」\n落地：「在親密關係裡，你是一個什麼樣的人？」\n卡點：一直說對方的問題→「我聽到了。在你說的這些裡，你自己最想感受到的是什麼？」` },
    2: { rule:'排序關係價值觀，建立親密願景。', context:`模組四：伴侶關係 第二週：排序＋願景` },
    3: { rule:'找出關係信念的根源。', context:`模組四：伴侶關係 第三週：關係信念` },
    4: { rule:'整合宣言，在關係中的Self Concept。', context:`模組四：伴侶關係 第四週：整合宣言` }
  }
};

let state = { studentName:'', module:'', week:0, sessionNotes:'', messages:[], isLoading:false };
let allSessions = JSON.parse(localStorage.getItem('coaching_sessions') || '[]');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'dashboard') renderDashboard();
}

function selectModule(btn, module) {
  document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.module = module;
  checkReady();
}

function selectWeek(btn, week) {
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.week = week;
  checkReady();
}

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  document.getElementById('startBtn').disabled = !(name && state.module && state.week);
}

document.getElementById('studentName').addEventListener('input', checkReady);

function startChat() {
  state.studentName = document.getElementById('studentName').value.trim();
  state.sessionNotes = document.getElementById('sessionNotes').value.trim();
  state.messages = [];
  document.getElementById('chatName').textContent = state.studentName;
  document.getElementById('chatMeta').textContent = `模組${['一','二','三','四'][['金錢','事業','親子家庭','伴侶關係'].indexOf(state.module)]} · 第${state.week}週`;
  document.getElementById('chatBadge').textContent = state.module;
  document.getElementById('chatMessages').innerHTML = '';
  showScreen('chat');
  setTimeout(() => addMessage('assistant', getOpeningQuestion()), 600);
}

function getOpeningQuestion() {
  if (state.week === 2) return `很高興繼續我們的探索。\n\n上週挖出的那些詞，現在回頭看，還有感覺嗎？有沒有哪個詞你想加、或是換掉的？`;
  if (state.week === 3) return `今天我們做一件不一樣的事。\n\n在你成長的過程中，關於「${state.module}」這件事，你家裡最常說的一句話是什麼？`;
  if (state.week === 4) return `我們到第四週了。\n\n這三週走下來，哪一個時刻讓你印象最深刻？哪一句你說出來的話，讓你自己停下來了？`;
  const starters = {
    金錢: `你好，很高興今天可以陪你探索。\n\n讓我問你第一個問題——\n\n如果你現在的金錢狀態，變成了你想要的樣子，你的生活會有什麼不同？`,
    事業: `你好，很高興今天可以陪你探索。\n\n讓我問你第一個問題——\n\n在事業上，你真正想要的是什麼？第一個冒出來的念頭，不用想太久。`,
    親子家庭: `你好，很高興今天可以陪你探索。\n\n讓我問你第一個問題——\n\n在你和家人的關係裡，你真正想要的是什麼？`,
    伴侶關係: `你好，很高興今天可以陪你探索。\n\n讓我問你第一個問題——\n\n在親密關係裡，你希望可以感受到什麼？你覺得什麼對你來說是重要的？`
  };
  return starters[state.module];
}

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const empty = msgs.querySelector('.empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  if (role === 'assistant') {
    div.innerHTML = `<div class="msg-with-avatar"><div class="coach-avatar">✦</div><div class="msg-text">${text.replace(/\n/g,'<br>')}</div></div><div class="msg-time">${time}</div>`;
  } else {
    div.innerHTML = `<div class="msg-text">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${time}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  state.messages.push({role, content:text, time});
  saveSession();
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing';
  div.innerHTML = `<div class="msg-with-avatar"><div class="coach-avatar">✦</div><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || state.isLoading) return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  state.isLoading = true;
  showTyping();
  try {
    const handbook = HANDBOOK[state.module][state.week];
    const notes = state.sessionNotes ? `\n\n上次Session重點：${state.sessionNotes}` : '';
    const systemPrompt = `你是一個教練助理，使用Damon Cart的Self Concept框架帶領學員進行內在探索。

學員姓名：${state.studentName}
目前模組：${state.module}
目前週次：第${state.week}週${notes}

核心守則：${handbook.rule}

手冊框架：
${handbook.context}

你的角色規則：
1. 你只問問題，不給建議，不做評論，不替學員說出任何詞彙
2. 每次只問一個問題，問完就停
3. 學員說什麼都繼續往下問，不評價答案的好壞
4. 若學員停在表層，用手冊的卡點處理問句帶他往內走
5. 問句要溫暖、自然，不要像問卷
6. 當學員說出某個詞時有停頓或情緒，停在那裡繼續深挖
7. 不要分析學員，不要解釋框架，就是問問題
8. 中文回覆，語氣溫和而有深度
9. 回覆簡短，通常就是一個問句加一句承接語`;

    const apiMessages = state.messages.filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({role:m.role, content:m.content}));

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({systemPrompt, messages: apiMessages})
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    hideTyping();
    addMessage('assistant', data.content);
  } catch(e) {
    hideTyping();
    addMessage('assistant', '抱歉，連線發生了問題。請稍後再試。');
  }
  state.isLoading = false;
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function saveSession() {
  const existing = allSessions.findIndex(s => s.studentName === state.studentName && s.module === state.module && s.week === state.week);
  const sessionData = { studentName:state.studentName, module:state.module, week:state.week, messages:state.messages, lastUpdated:new Date().toISOString() };
  if (existing >= 0) allSessions[existing] = sessionData;
  else allSessions.unshift(sessionData);
  localStorage.setItem('coaching_sessions', JSON.stringify(allSessions));
}

function renderDashboard() {
  allSessions = JSON.parse(localStorage.getItem('coaching_sessions') || '[]');
  const container = document.getElementById('dashContent');
  document.getElementById('convoDetail').style.display = 'none';
  container.style.display = 'block';
  if (allSessions.length === 0) {
    container.innerHTML = `<div class="empty-state" style="color:#7a9e7e"><div class="empty-icon">🌿</div><div style="font-size:14px;line-height:1.8">還沒有學員記錄</div></div>`;
    return;
  }
  container.innerHTML = allSessions.map((s,i) => {
    const lastMsg = s.messages.filter(m => m.role === 'user').slice(-1)[0];
    const preview = lastMsg ? lastMsg.content.substring(0,60)+'...' : '尚未回答';
    const date = new Date(s.lastUpdated).toLocaleDateString('zh-TW');
    const count = s.messages.filter(m => m.role === 'user').length;
    return `<div class="student-card" onclick="showConvo(${i})"><div class="student-name">${s.studentName}</div><div class="student-meta">${s.module} · 第${s.week}週 · ${date} · ${count}則回答</div><div class="student-preview">${preview}</div></div>`;
  }).join('');
}

function showConvo(idx) {
  const s = allSessions[idx];
  document.getElementById('dashContent').style.display = 'none';
  const detail = document.getElementById('convoDetail');
  detail.style.display = 'flex';
  document.getElementById('convoTitle').textContent = `${s.studentName} · ${s.module} · 第${s.week}週`;
  document.getElementById('convoMessages').innerHTML = s.messages.map(m => `<div class="msg-row"><div class="msg-label">${m.role==='assistant'?'✦ 助理':'👤 '+s.studentName}</div><div class="msg-bubble ${m.role}">${m.content.replace(/\n/g,'<br>')}</div></div>`).join('');
}

function closeConvo() {
  document.getElementById('convoDetail').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
}
</script>
</body>
</html>
