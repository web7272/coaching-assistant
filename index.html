<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>看見自己</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root{--sage:#7a9e7e;--sage-light:#a8c5ab;--sage-dark:#4a6b4e;--cream:#faf7f2;--charcoal:#2d2d2d;--mid:#6b6b6b;--light:#c8c0b8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--charcoal);min-height:100vh;}
  .screen{display:none;flex-direction:column;min-height:100vh;}
  .screen.active{display:flex;}

  #welcome{background:linear-gradient(160deg,#3d5c40 0%,#2d4030 40%,#1a2a1c 100%);justify-content:center;align-items:center;text-align:center;padding:40px 28px 56px;position:relative;overflow:hidden;}
  #welcome::before{content:'';position:absolute;top:-20%;right:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(122,158,126,0.15) 0%,transparent 70%);border-radius:50%;}
  .welcome-eyebrow{font-size:11px;letter-spacing:3px;color:#7a9e7e;text-transform:uppercase;margin-bottom:16px;}
  .welcome-title{font-family:'Noto Serif TC',serif;font-size:36px;font-weight:300;line-height:1.3;color:#f0ede8;margin-bottom:12px;}
  .welcome-title span{color:#a8c5ab;}
  .welcome-sub{font-size:14px;color:#8aaa8e;line-height:1.8;margin-bottom:48px;}
  .welcome-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:420px;}
  .btn-primary{background:linear-gradient(135deg,#7a9e7e,#5a7e5e);color:white;border:none;padding:18px 28px;border-radius:16px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 16px rgba(90,126,94,0.4);}
  .btn-secondary{background:rgba(255,255,255,0.06);color:#a8c5ab;border:1px solid rgba(122,158,126,0.3);padding:16px 28px;border-radius:16px;font-size:14px;font-family:inherit;cursor:pointer;text-align:left;}
  .disclaimer{font-size:11px;color:#8aaa8e;text-align:center;padding:16px 20px 0;line-height:1.6;}

  #setup{background:var(--cream);}
  .screen-header{background:white;padding:20px 24px 16px;border-bottom:1px solid #ede8e0;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
  .icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f0ede8;color:var(--mid);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .screen-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:400;}
  .setup-body{padding:24px 20px;flex:1;}
  .form-group{margin-bottom:20px;}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--mid);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;}
  .form-input{width:100%;padding:14px 16px;border:1.5px solid #e0dbd4;border-radius:12px;font-size:15px;font-family:inherit;color:var(--charcoal);background:white;outline:none;-webkit-appearance:none;}
  .form-input:focus{border-color:var(--sage);}
  .form-error{display:none;color:#c0392b;font-size:12px;margin-top:6px;padding-left:4px;}
  .form-info{display:none;font-size:13px;color:var(--sage-dark);margin-top:8px;padding:12px;background:#f0f7f0;border-radius:10px;line-height:1.7;}
  .setup-footer{padding:20px;background:white;border-top:1px solid #ede8e0;position:sticky;bottom:0;}
  .btn-full{width:100%;background:linear-gradient(135deg,#7a9e7e,#5a7e5e);color:white;border:none;padding:18px;border-radius:14px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(90,126,94,0.3);}
  .btn-full:disabled{background:#c8c0b8;box-shadow:none;cursor:not-allowed;}

  #chat{background:var(--cream);height:100vh;overflow:hidden;}
  .chat-header{background:white;padding:16px 20px;border-bottom:1px solid #ede8e0;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .chat-info{flex:1;min-width:0;}
  .chat-name{font-size:15px;font-weight:500;}
  .chat-meta{font-size:11px;color:var(--mid);margin-top:1px;}
  .module-badge{background:#f0f7f0;color:var(--sage-dark);border:1px solid #c8e0ca;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
  .day-indicator{background:white;padding:8px 20px;border-bottom:1px solid #ede8e0;display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .day-dot{width:8px;height:8px;border-radius:50%;background:#e0dbd4;transition:all 0.3s;}
  .day-dot.done{background:var(--sage-light);}
  .day-dot.today{background:var(--sage-dark);transform:scale(1.3);}
  .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  .msg{display:flex;flex-direction:column;max-width:88%;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .msg.assistant{align-self:flex-start;}
  .msg.user{align-self:flex-end;}
  .msg-with-avatar{display:flex;align-items:flex-end;gap:8px;}
  .coach-avatar{width:28px;height:28px;min-width:28px;background:linear-gradient(135deg,#7a9e7e,#4a6b4e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:white;margin-bottom:4px;}
  .msg-text{padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.75;}
  .msg.assistant .msg-text{background:white;color:var(--charcoal);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .msg.user .msg-text{background:linear-gradient(135deg,#7a9e7e,#5a7e5e);color:white;border-bottom-right-radius:4px;}
  .msg-time{font-size:10px;color:var(--light);margin-top:4px;padding:0 4px;}
  .msg.user .msg-time{text-align:right;}
  .day-divider{text-align:center;font-size:11px;color:var(--light);padding:8px 0;margin:4px 0;}
  .damon-note-card{background:linear-gradient(135deg,#2d4030,#1a2a1c);border-radius:20px;padding:24px;margin:8px 0;animation:fadeUp 0.5s ease;}
  .damon-note-header{font-size:11px;letter-spacing:2px;color:#7a9e7e;text-transform:uppercase;margin-bottom:12px;}
  .damon-note-quote{font-family:'Noto Serif TC',serif;font-size:16px;color:#f0ede8;line-height:1.7;margin-bottom:16px;font-style:italic;}
  .damon-note-divider{border:none;border-top:1px solid rgba(122,158,126,0.3);margin:16px 0;}
  .damon-note-tomorrow{font-size:13px;color:#a8c5ab;line-height:1.7;}
  .damon-note-label{font-size:11px;color:#7a9e7e;margin-bottom:6px;}
  .day-complete-card{background:white;border-radius:20px;padding:24px;margin:8px 0;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;animation:fadeUp 0.4s ease;}
  .day-complete-icon{font-size:36px;margin-bottom:12px;}
  .day-complete-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--charcoal);margin-bottom:8px;}
  .day-complete-sub{font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:20px;}
  .btn-complete{background:linear-gradient(135deg,#7a9e7e,#5a7e5e);color:white;border:none;padding:14px 28px;border-radius:14px;font-size:15px;font-family:inherit;cursor:pointer;}
  .already-done-card{background:#f0f7f0;border-radius:20px;padding:24px;margin:8px 0;text-align:center;}

  /* 影片嵌入 card（Day 1 / Day 2 影片日專用）*/
  .video-card{background:white;border-radius:16px;padding:16px;margin:8px 0;box-shadow:0 2px 12px rgba(0,0,0,0.06);animation:fadeUp 0.4s ease;}
  .video-card-label{font-size:11px;color:var(--mid);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
  .video-wrapper{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;background:#000;}
  .video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:#f5f5f0;border-radius:12px;color:var(--mid);font-size:13px;text-align:center;line-height:1.7;}
  .typing-indicator{display:flex;align-items:center;gap:8px;padding:12px 16px;background:white;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);max-width:80px;}
  .dot{width:7px;height:7px;background:var(--sage-light);border-radius:50%;animation:bounce 1.2s infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
  .chat-input-area{background:white;border-top:1px solid #ede8e0;padding:12px 16px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;}
  #userInput{flex:1;border:1.5px solid #e0dbd4;border-radius:22px;padding:12px 18px;font-size:15px;font-family:inherit;color:var(--charcoal);outline:none;resize:none;min-height:46px;max-height:120px;line-height:1.5;-webkit-appearance:none;}
  #userInput:focus{border-color:var(--sage);}
  #userInput:disabled{background:#f5f5f5;}
  .send-btn{width:46px;height:46px;min-width:46px;border-radius:50%;background:linear-gradient(135deg,#7a9e7e,#5a7e5e);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(90,126,94,0.4);flex-shrink:0;}
  .send-btn:disabled{background:#c8c0b8;box-shadow:none;cursor:not-allowed;}

  #dashboard{background:#1a2a1c;color:#e8f0e8;min-height:100vh;}
  .dash-header{padding:20px 24px 16px;border-bottom:1px solid #2d3f2f;display:flex;align-items:center;justify-content:space-between;}
  .dash-header h2{font-size:18px;font-weight:500;color:#a8c5ab;}
  .dash-actions{display:flex;gap:8px;}
  .back-btn{background:none;border:1px solid #4a6b4e;color:#a8c5ab;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;}
  .add-btn{background:#4a6b4e;border:none;color:#d4e8d4;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;}
  .dash-list{padding:16px;flex:1;overflow-y:auto;}
  .student-card{background:#243526;border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;}
  .student-name{font-size:16px;font-weight:500;color:#d4e8d4;margin-bottom:4px;}
  .student-meta{font-size:12px;color:#7a9e7e;margin-bottom:4px;}
  .student-plan{font-size:11px;color:#4a6b4e;margin-bottom:8px;}
  .student-preview{font-size:13px;color:#9ab09a;line-height:1.6;}
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.active{display:flex;}
  .modal{background:#1e3020;border-radius:20px;padding:24px;width:100%;max-width:400px;}
  .modal h3{color:#a8c5ab;font-size:18px;margin-bottom:20px;}
  .modal-field{margin-bottom:16px;}
  .modal-label{display:block;font-size:12px;color:#7a9e7e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
  .modal-input{width:100%;padding:12px 14px;background:#243526;border:1px solid #4a6b4e;border-radius:10px;color:#d4e8d4;font-size:14px;font-family:inherit;outline:none;}
  .modal-select{width:100%;padding:12px 14px;background:#243526;border:1px solid #4a6b4e;border-radius:10px;color:#d4e8d4;font-size:14px;font-family:inherit;outline:none;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-cancel{flex:1;background:none;border:1px solid #4a6b4e;color:#a8c5ab;padding:12px;border-radius:10px;font-family:inherit;cursor:pointer;font-size:14px;}
  .modal-save{flex:2;background:#4a6b4e;border:none;color:#d4e8d4;padding:12px;border-radius:10px;font-family:inherit;cursor:pointer;font-size:14px;font-weight:500;}
  .modal-result{margin-top:12px;padding:12px;background:#243526;border-radius:10px;color:#a8c5ab;font-size:14px;display:none;}
  .convo-detail{display:none;flex-direction:column;height:100vh;background:#1a2a1c;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;}
  .convo-header{padding:16px 20px;border-bottom:1px solid #2d3f2f;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .convo-header h3{font-size:15px;color:#d4e8d4;flex:1;}
  .convo-tabs{display:flex;border-bottom:1px solid #2d3f2f;flex-shrink:0;}
  .convo-tab{flex:1;padding:12px;text-align:center;font-size:13px;color:#7a9e7e;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
  .convo-tab.active{color:#a8c5ab;border-bottom-color:#7a9e7e;}
  .convo-content{flex:1;overflow-y:auto;padding:16px;}
  .msg-row{margin-bottom:16px;}
  .msg-label{font-size:11px;color:#7a9e7e;margin-bottom:4px;font-weight:500;text-transform:uppercase;}
  .msg-bubble{background:#243526;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.7;color:#d4e8d4;}
  .msg-bubble.assistant{background:#1e3320;border-left:3px solid #7a9e7e;color:#b8d4b8;}
  .damon-note-full{background:#243526;border-radius:12px;padding:16px;margin-bottom:16px;}
  .damon-note-section{margin-bottom:16px;}
  .damon-note-section-title{font-size:11px;color:#7a9e7e;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .damon-note-section-content{font-size:14px;color:#d4e8d4;line-height:1.7;}
  .damon-note-sc{background:#1a2a1c;border-left:3px solid #534ab7;padding:10px 12px;border-radius:0 8px 8px 0;font-size:13px;color:#b8b0d4;line-height:1.7;font-style:italic;}
  .export-btn{margin:0 16px 16px;background:#4a6b4e;color:#d4e8d4;border:none;padding:12px 20px;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;width:calc(100% - 32px);}
  .loading{text-align:center;padding:40px;color:#7a9e7e;font-size:14px;}
  .empty-state{text-align:center;padding:60px 24px;color:#7a9e7e;}
</style>
</head>
<body>

<div id="welcome" class="screen active">
  <div class="welcome-eyebrow">See Yourself</div>
  <div class="welcome-title">看見你<br>內心的<span>那個人</span></div>
  <div class="welcome-sub">透過每天的對話<br>看見驅動你的那個核心</div>
  <div class="welcome-buttons">
    <button class="btn-primary" onclick="showScreen('setup')"><span>開始探索</span><span>→</span></button>
    <button class="btn-secondary" onclick="showDashboard()">📋 教練後台</button>
  </div>
  <div class="disclaimer">本工具為教練輔助工具，不提供心理治療或醫療建議。</div>
</div>

<div id="setup" class="screen">
  <div class="screen-header">
    <button class="icon-btn" onclick="showScreen('welcome')">←</button>
    <span class="screen-title">開始今天的探索</span>
  </div>
  <div class="setup-body">
    <div class="form-group">
      <label class="form-label">你的專屬編號</label>
      <input type="text" class="form-input" id="studentId" placeholder="輸入教練給你的編號（例如 A001）" maxlength="4" oninput="onIdInput()">
    </div>
    <div class="form-group">
      <label class="form-label">你的 Email</label>
      <input type="email" class="form-input" id="studentEmail" placeholder="輸入你的 email" oninput="onIdInput()">
      <div class="form-error" id="idError">編號或 email 不正確，請確認後再試</div>
      <div class="form-info" id="studentInfo"></div>
    </div>
  </div>
  <div class="setup-footer">
    <button class="btn-full" id="startBtn" onclick="startChat()" disabled>開始今天的探索</button>
  </div>
</div>

<div id="chat" class="screen">
  <div class="chat-header">
    <button class="icon-btn" onclick="showScreen('welcome')">←</button>
    <div class="chat-info">
      <div class="chat-name" id="chatName">—</div>
      <div class="chat-meta" id="chatMeta">—</div>
    </div>
    <div class="module-badge" id="chatBadge">—</div>
  </div>
  <div class="day-indicator" id="dayIndicator"></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="輸入你的回答..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<div id="dashboard" class="screen" style="background:#1a2a1c;color:#e8f0e8;">
  <div class="dash-header">
    <h2>📋 教練後台</h2>
    <div class="dash-actions">
      <button class="add-btn" onclick="showAddModal()">+ 新增學員</button>
      <button class="back-btn" onclick="showScreen('welcome')">← 返回</button>
    </div>
  </div>
  <div id="dashContent" class="dash-list"></div>
  <div id="convoDetail" class="convo-detail">
    <div class="convo-header">
      <button class="icon-btn" style="background:#2d4030;color:#a8c5ab;flex-shrink:0" onclick="closeConvo()">←</button>
      <h3 id="convoTitle">—</h3>
    </div>
    <div class="convo-tabs">
      <button class="convo-tab active" onclick="switchTab('messages')">對話記錄</button>
      <button class="convo-tab" onclick="switchTab('note')">Damon Note</button>
    </div>
    <button class="export-btn" onclick="exportConvo()">📋 複製對話</button>
    <div class="convo-content" id="convoContent"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>新增學員</h3>
    <div class="modal-field">
      <label class="modal-label">Email（選填）</label>
      <input type="email" class="modal-input" id="newEmail" placeholder="student@email.com">
    </div>
    <div class="modal-field">
      <label class="modal-label">方案</label>
      <select class="modal-select" id="newPlan">
        <option value="trial">免費試用</option>
        <option value="self_only">自我關係（NT$2,000）</option>
        <option value="self_money">自我+金錢（NT$3,500）</option>
        <option value="self_relationship">自我+伴侶（NT$3,500）</option>
        <option value="all">全套（NT$5,000）</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">層級</label>
      <select class="modal-select" id="newTier">
        <option value="0">免費試用</option>
        <option value="1">自學系統</option>
        <option value="2">陪跑版</option>
        <option value="3">1對1教練</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">備注（選填）</label>
      <input type="text" class="modal-input" id="newNotes" placeholder="例如：從朋友介紹進來">
    </div>
    <div class="modal-result" id="addResult"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideAddModal()">取消</button>
      <button class="modal-save" onclick="addStudent()">建立學員</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editStudentId">編輯學員</h3>
    <div class="modal-field">
      <label class="modal-label">方案</label>
      <select class="modal-select" id="editPlan">
        <option value="trial">免費試用</option>
        <option value="self_only">自我關係（NT$2,000）</option>
        <option value="self_money">自我+金錢（NT$3,500）</option>
        <option value="self_relationship">自我+伴侶（NT$3,500）</option>
        <option value="all">全套（NT$5,000）</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">層級</label>
      <select class="modal-select" id="editTier">
        <option value="0">免費試用</option>
        <option value="1">自學系統</option>
        <option value="2">陪跑版</option>
        <option value="3">1對1教練</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">當前模組</label>
      <select class="modal-select" id="editModule">
        <option value="self">🌿 自我關係</option>
        <option value="money">💰 金錢關係</option>
        <option value="relationship">💫 伴侶關係</option>
      </select>
    </div>
    <div class="modal-field" style="display:flex;gap:12px;">
      <div style="flex:1;">
        <label class="modal-label">第幾週</label>
        <select class="modal-select" id="editWeek">
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
        </select>
      </div>
      <div style="flex:1;">
        <label class="modal-label">第幾天</label>
        <select class="modal-select" id="editDay">
          <option value="1">Day 1</option>
          <option value="2">Day 2</option>
          <option value="3">Day 3</option>
          <option value="4">Day 4</option>
          <option value="5">Day 5</option>
          <option value="6">Day 6</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">備注</label>
      <input type="text" class="modal-input" id="editNotes" placeholder="教練備注">
    </div>
    <div class="modal-result" id="editResult"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideEditModal()">取消</button>
      <button class="modal-save" onclick="saveStudent()">儲存變更</button>
    </div>
  </div>
</div>

<script>
const MODULE_LABELS = {self:'🌿 自我關係',money:'💰 金錢關係',relationship:'💫 伴侶關係'};
const PLAN_LABELS = {trial:'免費試用',self_only:'自我關係',self_money:'自我+金錢',self_relationship:'自我+伴侶',all:'全套'};
const TIER_LABELS = {0:'免費試用',1:'自學系統',2:'陪跑版',3:'1對1教練'};

// ============================================================
// 🎬 影片 ID 對照表（YouTube video ID）
// 影片錄完後把每格的 'PLACEHOLDER' 換成實際 YouTube ID
// 例如：https://www.youtube.com/watch?v=dQw4w9WgXcQ → 'dQw4w9WgXcQ'
// 設成空字串 '' 或 null 會顯示「影片準備中」placeholder
// ============================================================
const DEMO_VIDEO_ID = 'dQw4w9WgXcQ'; // demo placeholder（Rick Roll 😅）
const VIDEO_URLS = {
  self: {
    1: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    2: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    3: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    4: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
  },
  money: {
    1: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    2: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    3: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    4: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
  },
  relationship: {
    1: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    2: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    3: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
    4: { 1: DEMO_VIDEO_ID, 2: DEMO_VIDEO_ID },
  },
};

function getVideoId(module, week, day) {
  return VIDEO_URLS[module]?.[week]?.[day] || null;
}

function renderVideoEmbed() {
  const isVideoDay = state.day === 1 || state.day === 2;
  if (!isVideoDay) return;
  const videoId = getVideoId(state.module, state.week, state.day);
  const msgs = document.getElementById('chatMessages');
  const card = document.createElement('div');
  card.className = 'video-card';
  if (videoId) {
    card.innerHTML = `
      <div class="video-card-label">📺 今天的影片</div>
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1"
                frameborder="0"
                allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="video-card-label">📺 今天的影片</div>
      <div class="video-placeholder">
        影片準備中<br><span style="font-size:11px;color:var(--light)">請直接打「我準備好了」開始今天的對話</span>
      </div>
    `;
  }
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;
}

let state = {studentId:'',module:'',week:0,day:0,messages:[],isLoading:false,dayComplete:false};
let currentConvoData = null;
let currentTab = 'messages';
let studentData = null;
let lookupTimer = null;

function getToday() {
  // Use client's local date in YYYY-MM-DD format
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showDashboard() {
  const pwd = prompt('請輸入教練密碼：');
  if (pwd !== 'vivi2024coach') { alert('密碼錯誤'); return; }
  showScreen('dashboard');
  loadDashboard();
}

// ==================== SETUP ====================
function onIdInput() {
  const id = document.getElementById('studentId').value.trim().toUpperCase();
  const email = document.getElementById('studentEmail').value.trim().toLowerCase();
  document.getElementById('idError').style.display = 'none';
  document.getElementById('studentInfo').style.display = 'none';
  document.getElementById('startBtn').disabled = true;
  studentData = null;
  if (!/^[A-Za-z]\d{3}$/.test(id)) return;
  if (!email || !email.includes('@')) return;
  clearTimeout(lookupTimer);
  lookupTimer = setTimeout(() => lookupStudent(id, email), 500);
}

async function lookupStudent(id, email) {
  try {
    // 後端雙重驗證：student_id + email 都對才回資料
    // email 不再從 URL 流出，前端也拿不到 email（只拿驗證結果）
    const res = await fetch('/api/students', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'login', studentId: id, email})
    });
    if (!res.ok) {
      // 401 / 400 / 404 都統一顯示錯誤訊息（不洩漏哪個錯）
      document.getElementById('idError').style.display = 'block';
      document.getElementById('idError').textContent = '編號或 email 不正確，請確認後再試';
      return;
    }
    const data = await res.json();
    studentData = data.student;
    const moduleLabel = MODULE_LABELS[studentData.current_module] || studentData.current_module;
    const infoEl = document.getElementById('studentInfo');
    infoEl.style.display = 'block';
    infoEl.innerHTML = `<strong>${moduleLabel}</strong><br>Week ${studentData.current_week} · Day ${studentData.current_day}<br><span style="color:var(--mid);font-size:12px">${PLAN_LABELS[studentData.plan] || studentData.plan}</span>`;
    document.getElementById('startBtn').disabled = false;
  } catch(e) {
    document.getElementById('idError').style.display = 'block';
    document.getElementById('idError').textContent = '連線錯誤，請稍後再試';
  }
}

async function startChat() {
  if (!studentData) return;

  state.studentId = document.getElementById('studentId').value.trim().toUpperCase();
  state.module = studentData.current_module;
  state.week = studentData.current_week;
  state.day = studentData.current_day;
  state.messages = [];
  state.dayComplete = false;

  const moduleLabel = MODULE_LABELS[state.module];
  document.getElementById('chatName').textContent = state.studentId;
  document.getElementById('chatMeta').textContent = `${moduleLabel} Week ${state.week} Day ${state.day}`;
  document.getElementById('chatBadge').textContent = moduleLabel;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('userInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;

  updateDayIndicator();
  showScreen('chat');

  // 載入今天的對話狀態
  await loadTodaySession();
}

async function loadTodaySession() {
  const today = getToday();

  try {
    const res = await fetch(`/api/sessions?action=history&studentId=${state.studentId}&module=${encodeURIComponent(state.module)}&week=${state.week}`);
    const data = await res.json();

    if (!data.messages || data.messages.length === 0) {
      // 完全沒有對話記錄，開始全新的
      setTimeout(() => { addMessage('assistant', getOpeningMessage(), true); renderVideoEmbed(); }, 500);
      return;
    }

    // 找今天的訊息
    const todayMsgs = data.messages.filter(m => {
      const msgDate = m.session_date || m.created_at?.split('T')[0];
      return msgDate === today;
    });

    // 找今天的 session 狀態
    const todaySession = data.sessions?.find(s => s.session_date === today);
    const isDoneToday = todaySession?.day_complete === true;

    if (todayMsgs.length > 0) {
      // 今天有對話記錄——載入顯示
      const divider = document.createElement('div');
      divider.className = 'day-divider';
      divider.textContent = '── 繼續今天的探索 ──';
      document.getElementById('chatMessages').appendChild(divider);

      todayMsgs.forEach(m => {
        renderMessage(m.role, m.content);
        state.messages.push({ role: m.role, content: m.content });
      });

      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;

      if (isDoneToday) {
        // 今天已完成，顯示完成卡，鎖定輸入
        if (todaySession?.damon_note_public) {
          showDamonNote(todaySession.damon_note_public);
        }
        showAlreadyDone();
      }
      // 今天未完成，直接繼續（不顯示開場問句）
      return;
    }

    // 今天沒有對話，但之前有——開始今天的新對話
    // 找最近一天的 damon_note_public
    const lastSession = data.sessions?.[data.sessions.length - 1];
    const yesterdayNotePublic = lastSession?.damon_note_public || null;
    setTimeout(() => { addMessage('assistant', getOpeningMessage(yesterdayNotePublic), true); renderVideoEmbed(); }, 500);

  } catch(e) {
    console.log('Load session error:', e);
    setTimeout(() => { addMessage('assistant', getOpeningMessage(), true); renderVideoEmbed(); }, 500);
  }
}

function showAlreadyDone() {
  const msgs = document.getElementById('chatMessages');
  const card = document.createElement('div');
  card.className = 'already-done-card';
  card.innerHTML = `
    <div style="font-size:28px;margin-bottom:8px">✓</div>
    <div style="font-family:'Noto Serif TC',serif;font-size:16px;color:var(--sage-dark);margin-bottom:6px">今天的探索已完成</div>
    <div style="font-size:13px;color:var(--mid);line-height:1.7">讓今天的東西繼續沉澱。<br>明天我們繼續。</div>
  `;
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('userInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  state.dayComplete = true;
}

function getOpeningMessage(yesterdayNotePublic) {
  const isVideoDay = state.day === 1 || state.day === 2;
  const isDay6 = state.day === 6;

  if (isDay6) return `今天是整合日。\n\n這週你說了很多重要的事。讓我們把這週放在一起看。`;

  // 有昨天的 Damon Note——承接昨天
  if (state.day > 1 && yesterdayNotePublic) {
    // 抽取昨天的關鍵句
    const lines = yesterdayNotePublic.split('\n');
    const keyLine = lines.find(l => l.startsWith('「') || l.includes('「')) || '';
    const keyPhrase = keyLine.trim();

    if (isVideoDay) {
      return `歡迎回來。\n\n昨天你說了 ${keyPhrase}\n\n我們等等繼續往那裡走。\n\n今天也有一支影片——先去看完，看完回來告訴我有沒有什麼讓你停下來的地方。`;
    } else {
      return `歡迎回來。\n\n昨天你說了 ${keyPhrase}\n\n今天我們從這裡繼續往更深處走。`;
    }
  }

  // 第一天或沒有昨天的 Note
  if (state.day > 1) {
    return `歡迎回來。\n\n昨天你走到了很重要的地方。今天我們繼續往更深處走。\n\n${isVideoDay ? '今天先去看今天的影片，看完回來告訴我讓你停下來的地方。' : '今天從哪裡開始，你說。'}`;
  }

  const openings = {
    self: isVideoDay
      ? `你好，很高興今天可以陪你探索。\n\n今天先去看影片，看完回來告訴我：有沒有什麼讓你停下來？`
      : `你好，很高興今天可以陪你探索。\n\n在你的生活裡，有什麼地方讓你感覺不對勁？或者有什麼你覺得應該不是這樣的？`,
    money: isVideoDay
      ? `你好，很高興今天可以陪你探索。\n\n今天先去看影片，看完回來告訴我：有沒有什麼讓你停下來？`
      : `你好，很高興今天可以陪你探索。\n\n在你的金錢和事業上，有什麼地方讓你感覺不對勁？`,
    relationship: isVideoDay
      ? `你好，很高興今天可以陪你探索。\n\n今天先去看影片，看完回來告訴我：有沒有什麼讓你停下來？`
      : `你好，很高興今天可以陪你探索。\n\n在你最重要的關係裡，有什麼地方讓你感覺不對勁？不用整理，說那個感覺。`
  };
  return openings[state.module] || openings.self;
}

function updateDayIndicator() {
  const indicator = document.getElementById('dayIndicator');
  indicator.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const dot = document.createElement('div');
    dot.className = 'day-dot' + (i < state.day ? ' done' : '') + (i === state.day ? ' today' : '');
    indicator.appendChild(dot);
  }
}

// ==================== CHAT ====================
function renderMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
  if (role === 'assistant') {
    div.innerHTML = `<div class="msg-with-avatar"><div class="coach-avatar">✦</div><div class="msg-text">${text.replace(/\n/g,'<br>')}</div></div><div class="msg-time">${time}</div>`;
  } else {
    div.innerHTML = `<div class="msg-text">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${time}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(role, text, isOpening = false) {
  renderMessage(role, text);
  // 開場訊息（前端組的「歡迎回來」之類）不進 state.messages，避免污染送給 Anthropic API 的歷史
  // Anthropic API 規定 messages 第一條必須是 user，如果開場 assistant 訊息進 state.messages，會讓 API 回 400
  if (!isOpening) state.messages.push({role, content: text});
}

function showDamonNote(notePublic) {
  if (!notePublic) return;
  const msgs = document.getElementById('chatMessages');
  const tomorrowIdx = notePublic.indexOf('明天我們從這裡繼續');
  const todayText = tomorrowIdx > -1 ? notePublic.substring(0, tomorrowIdx).trim() : notePublic;
  const tomorrowText = tomorrowIdx > -1 ? notePublic.substring(tomorrowIdx + 10).trim() : '';
  const card = document.createElement('div');
  card.className = 'damon-note-card';
  card.innerHTML = `
    <div class="damon-note-header">✦ 今天的觀察</div>
    <div class="damon-note-quote">${todayText.replace(/\n/g,'<br>')}</div>
    ${tomorrowText ? `<hr class="damon-note-divider"><div class="damon-note-label">明天我們從這裡繼續</div><div class="damon-note-tomorrow">${tomorrowText}</div>` : ''}
  `;
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;
}

function showDayComplete() {
  const msgs = document.getElementById('chatMessages');
  const card = document.createElement('div');
  card.className = 'day-complete-card';
  card.innerHTML = `
    <div class="day-complete-icon">🌿</div>
    <div class="day-complete-title">今天先到這裡</div>
    <div class="day-complete-sub">讓今天的東西在心裡沉澱。<br>明天我們繼續往更深的地方走。</div>
    <button class="btn-complete" onclick="showScreen('welcome')">回到首頁</button>
  `;
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('userInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  state.dayComplete = true;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing';
  div.innerHTML = `<div class="msg-with-avatar"><div class="coach-avatar">✦</div><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  if (state.dayComplete) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || state.isLoading) return;

  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  state.isLoading = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: state.messages.map(m => ({role:m.role, content:m.content})),
        studentId: state.studentId,
        module: state.module,
        week: state.week,
        day: state.day,
        sessionNotes: '',
        today: getToday()
      })
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    hideTyping();
    addMessage('assistant', data.content);

    if (data.dayComplete) {
      setTimeout(() => {
        if (data.damonNotePublic) showDamonNote(data.damonNotePublic);
        setTimeout(() => showDayComplete(), 1500);
      }, 800);
    }
  } catch(e) {
    hideTyping();
    addMessage('assistant', '抱歉，連線發生了問題。請稍後再試。', true);
  }
  state.isLoading = false;
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

// ==================== DASHBOARD ====================
async function loadDashboard() {
  const container = document.getElementById('dashContent');
  container.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch('/api/students');
    const data = await res.json();
    if (!data.students || data.students.length === 0) {
      container.innerHTML = `<div class="empty-state"><div style="font-size:40px;margin-bottom:16px">🌿</div><div>還沒有學員，點「+ 新增學員」開始</div></div>`;
      return;
    }
    container.innerHTML = data.students.map(s => {
      const moduleLabel = MODULE_LABELS[s.current_module] || s.current_module;
      const planLabel = PLAN_LABELS[s.plan] || s.plan;
      const tierLabel = TIER_LABELS[s.tier] || s.tier;
      const lastActive = s.last_active ? new Date(s.last_active).toLocaleDateString('zh-TW') : '尚未開始';
      const studentJson = JSON.stringify(s).replace(/"/g, '&quot;');
      return `<div class="student-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div class="student-name">${s.student_id}${s.email ? ' · ' + s.email : ''}</div>
          <button onclick="event.stopPropagation();showEditModal(JSON.parse(this.dataset.s))" data-s="${studentJson}" style="background:#4a6b4e;border:none;color:#d4e8d4;padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;">✏️ 編輯</button>
        </div>
        <div onclick="showConvo('${s.student_id}','${s.current_module}',${s.current_week})" style="cursor:pointer;">
          <div class="student-meta">${moduleLabel} Week ${s.current_week} Day ${s.current_day} · 最後活躍 ${lastActive}</div>
          <div class="student-plan">${planLabel} · ${tierLabel} · 完成 ${s.days_completed || 0} 天</div>
          ${s.notes ? `<div class="student-preview">${s.notes}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div class="empty-state">載入失敗，請重試</div>`;
  }
}

function showAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('addResult').style.display = 'none';
  document.getElementById('newEmail').value = '';
  document.getElementById('newNotes').value = '';
}
function hideAddModal() { document.getElementById('addModal').classList.remove('active'); }

async function addStudent() {
  const email = document.getElementById('newEmail').value.trim();
  const plan = document.getElementById('newPlan').value;
  const tier = parseInt(document.getElementById('newTier').value);
  const notes = document.getElementById('newNotes').value.trim();
  try {
    const res = await fetch('/api/students', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, plan, tier, notes})
    });
    const data = await res.json();
    const resultEl = document.getElementById('addResult');
    resultEl.style.display = 'block';
    if (data.success) {
      resultEl.innerHTML = `✅ 學員建立成功！<br><strong style="font-size:20px;color:#a8c5ab">${data.studentId}</strong><br>這是他的專屬編號，請傳給學員。`;
      setTimeout(() => { hideAddModal(); loadDashboard(); }, 3000);
    } else if (data.error === 'EMAIL_EXISTS') {
      resultEl.innerHTML = `⚠️ ${data.message}`;
    } else {
      resultEl.textContent = '建立失敗：' + (data.error || '未知錯誤');
    }
  } catch(e) {
    document.getElementById('addResult').style.display = 'block';
    document.getElementById('addResult').textContent = '連線錯誤，請稍後再試';
  }
}

async function showConvo(studentId, module, week) {
  document.getElementById('dashContent').style.display = 'none';
  const detail = document.getElementById('convoDetail');
  detail.style.display = 'flex';
  document.getElementById('convoTitle').textContent = `${studentId} · ${MODULE_LABELS[module]||module} · Week ${week}`;
  currentConvoData = {studentId, module, week};
  currentTab = 'messages';
  document.querySelectorAll('.convo-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  await loadConvoContent();
}

async function loadConvoContent() {
  const container = document.getElementById('convoContent');
  container.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const {studentId, module, week} = currentConvoData;
    const res = await fetch(`/api/sessions?action=history&studentId=${studentId}&module=${encodeURIComponent(module)}&week=${week}`);
    const data = await res.json();
    currentConvoData.messages = data.messages || [];
    currentConvoData.sessions = data.sessions || [];
    renderConvoContent();
  } catch(e) {
    container.innerHTML = '<div style="color:#7a9e7e;padding:20px">載入失敗</div>';
  }
}

function renderConvoContent() {
  const container = document.getElementById('convoContent');
  const {messages, sessions, studentId} = currentConvoData;
  if (currentTab === 'messages') {
    if (!messages || messages.length === 0) { container.innerHTML = '<div style="color:#7a9e7e;padding:20px">還沒有對話記錄</div>'; return; }
    let html = '', currentDay = null;
    messages.forEach(m => {
      if (m.day !== currentDay) {
        currentDay = m.day;
        html += `<div style="text-align:center;font-size:11px;color:#4a6b4e;padding:12px 0;font-weight:500">── Day ${m.day} ──</div>`;
      }
      html += `<div class="msg-row"><div class="msg-label">${m.role==='assistant'?'✦ 助理':'👤 '+studentId}</div><div class="msg-bubble ${m.role}">${m.content.replace(/\n/g,'<br>')}</div></div>`;
    });
    container.innerHTML = html;
  } else {
    if (!sessions || sessions.length === 0) { container.innerHTML = '<div style="color:#7a9e7e;padding:20px">還沒有 Damon Note</div>'; return; }
    let html = '';
    sessions.forEach(s => {
      if (!s.damon_note) return;
      html += `<div style="margin-bottom:20px"><div style="font-size:11px;color:#4a6b4e;margin-bottom:8px;font-weight:500">── Day ${s.day} · ${s.session_date} ──</div><div class="damon-note-full">${formatDamonNote(s.damon_note)}</div></div>`;
    });
    container.innerHTML = html || '<div style="color:#7a9e7e;padding:20px">還沒有 Damon Note</div>';
  }
}

function formatDamonNote(note) {
  const sections = ['今天的模式','深度層次','關鍵句','SC 觀察','還沒碰到的','明天的入口'];
  let html = '';
  sections.forEach(s => {
    const match = note.match(new RegExp(`【${s}】\\s*\\n([\\s\\S]*?)(?=\\n【|$)`));
    if (match) {
      const content = match[1].trim();
      const isSC = s === 'SC 觀察';
      html += `<div class="damon-note-section"><div class="damon-note-section-title">${s}</div>${isSC?`<div class="damon-note-sc">${content.replace(/\n/g,'<br>')}</div>`:`<div class="damon-note-section-content">${content.replace(/\n/g,'<br>')}</div>`}</div>`;
    }
  });
  return html;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.convo-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='messages')||(i===1&&tab==='note')));
  renderConvoContent();
}

function exportConvo() {
  if (!currentConvoData?.messages) return;
  const {studentId, module, week, messages} = currentConvoData;
  let text = `學員：${studentId}\n模組：${MODULE_LABELS[module]||module} Week ${week}\n日期：${new Date().toLocaleDateString('zh-TW')}\n\n`;
  let currentDay = null;
  messages.forEach(m => {
    if (m.day !== currentDay) { currentDay = m.day; text += `\n===== Day ${m.day} =====\n\n`; }
    text += `${m.role==='assistant'?'【助理】':'【學員】'}\n${m.content}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('已複製！'));
}

let editingStudentId = null;

function showEditModal(student) {
  editingStudentId = student.student_id;
  document.getElementById('editStudentId').textContent = `編輯學員：${student.student_id} · ${student.email || ''}`;
  document.getElementById('editPlan').value = student.plan || 'trial';
  document.getElementById('editTier').value = student.tier || 0;
  document.getElementById('editModule').value = student.current_module || 'self';
  document.getElementById('editWeek').value = student.current_week || 1;
  document.getElementById('editDay').value = student.current_day || 1;
  document.getElementById('editNotes').value = student.notes || '';
  document.getElementById('editResult').style.display = 'none';
  document.getElementById('editModal').classList.add('active');
}

function hideEditModal() {
  document.getElementById('editModal').classList.remove('active');
  editingStudentId = null;
}

async function saveStudent() {
  if (!editingStudentId) return;
  const resultEl = document.getElementById('editResult');
  try {
    const res = await fetch('/api/students', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        studentId: editingStudentId,
        plan: document.getElementById('editPlan').value,
        tier: parseInt(document.getElementById('editTier').value),
        current_module: document.getElementById('editModule').value,
        current_week: parseInt(document.getElementById('editWeek').value),
        current_day: parseInt(document.getElementById('editDay').value),
        notes: document.getElementById('editNotes').value.trim()
      })
    });
    const data = await res.json();
    if (data.success) {
      resultEl.style.display = 'block';
      resultEl.textContent = '✅ 儲存成功';
      setTimeout(() => { hideEditModal(); loadDashboard(); }, 1500);
    } else {
      resultEl.style.display = 'block';
      resultEl.textContent = '儲存失敗：' + (data.error || '未知錯誤');
    }
  } catch(e) {
    resultEl.style.display = 'block';
    resultEl.textContent = '連線錯誤，請稍後再試';
  }
}

function closeConvo() {
  document.getElementById('convoDetail').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
  currentConvoData = null;
}
</script>
